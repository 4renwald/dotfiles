# Keep Jellyfin MPV Shim hotkeys aligned with the standalone mpv config.
# Anime4K is intentionally limited to four presets, following the upstream
# Linux instructions: 1080p, 720p, 480p, and disable.

Ctrl+0 apply-profile shaders-off ; show-text "Shaders disabled"
Ctrl+1 apply-profile anime4k-1080p ; show-text "Anime4K 1080p"
Ctrl+2 apply-profile anime4k-720p ; show-text "Anime4K 720p"
Ctrl+3 apply-profile anime4k-480p ; show-text "Anime4K 480p"
Ctrl+4 apply-profile video-hq ; show-text "HQ video shaders"
