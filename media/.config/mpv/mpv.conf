# Requires the Arch package `mpv-shim-default-shaders`.
# Default to a high-quality general-video chain for YouTube, livestreams,
# and other non-anime content. Anime4K stays on manual hotkeys only.

profile=high-quality
hwdec=auto-safe
deband=yes
deband-iterations=4
deband-threshold=35
deband-range=16
deband-grain=0
video-sync=display-resample
interpolation=yes
tscale=oversample

glsl-shaders=/usr/share/mpv-shim-default-shaders/shaders/FSRCNNX_x2_16-0-4-1.glsl:/usr/share/mpv-shim-default-shaders/shaders/SSimDownscaler.glsl:/usr/share/mpv-shim-default-shaders/shaders/KrigBilateral.glsl
scale=ewa_lanczos
cscale=mitchell
dscale=mitchell
linear-downscaling=no

[shaders-off]
profile-desc=Disable all custom shader chains
glsl-shaders=
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
linear-downscaling=yes

[video-hq]
profile-desc=High-quality general video for YouTube and livestreams
glsl-shaders=/usr/share/mpv-shim-default-shaders/shaders/FSRCNNX_x2_16-0-4-1.glsl:/usr/share/mpv-shim-default-shaders/shaders/SSimDownscaler.glsl:/usr/share/mpv-shim-default-shaders/shaders/KrigBilateral.glsl
scale=ewa_lanczos
cscale=mitchell
dscale=mitchell
linear-downscaling=no

[anime4k-1080p]
profile-desc=Anime4K mode A for 1080p anime
glsl-shaders=/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Clamp_Highlights.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Restore_CNN_M.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Upscale_CNN_x2_M.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_AutoDownscalePre_x2.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_AutoDownscalePre_x4.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Upscale_CNN_x2_S.glsl
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
linear-downscaling=no

[anime4k-720p]
profile-desc=Anime4K mode B for 720p anime
glsl-shaders=/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Clamp_Highlights.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Restore_CNN_Soft_M.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Upscale_CNN_x2_M.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_AutoDownscalePre_x2.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_AutoDownscalePre_x4.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Upscale_CNN_x2_S.glsl
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
linear-downscaling=no

[anime4k-480p]
profile-desc=Anime4K mode C for 480p anime
glsl-shaders=/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Clamp_Highlights.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Upscale_Denoise_CNN_x2_M.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_AutoDownscalePre_x2.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_AutoDownscalePre_x4.glsl:/usr/share/mpv-shim-default-shaders/shaders/Anime4K_Upscale_CNN_x2_S.glsl
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
linear-downscaling=no
